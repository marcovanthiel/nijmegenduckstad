name: Deploy to Cloudflare Workers

# Auto-deploy bij elke push naar main. Manueel triggeren kan ook
# (Actions tab → "Deploy to Cloudflare Workers" → Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Voorkom dat twee deploys elkaar inhalen — annuleer een lopende deploy
# als er een nieuwere commit komt.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # volledige historie nodig voor de updates-lijst

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Genereer versie-info (version.json + updates.json)
        run: |
          N=$(git rev-list --count HEAD)
          VER="1.$((N/10)).$((N%10))"   # versie volgt de historie (aantal updates)
          printf '{"version":"%s","commit":"%s","date":"%s"}' "$VER" "${GITHUB_SHA::7}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          python3 - <<'PY'
          import subprocess, json
          out = subprocess.run(['git','log','-40','--no-merges','--pretty=format:%h%x1f%cI%x1f%s'],
                               capture_output=True, text=True).stdout
          entries=[]
          for line in out.splitlines():
              p=line.split('\x1f')
              if len(p)==3: entries.append({'sha':p[0],'date':p[1],'subject':p[2]})
          json.dump({'entries':entries}, open('updates.json','w'), ensure_ascii=False)
          PY
          echo "version.json: $(cat version.json)"

      - name: Deploy met wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler: de action-default kan een oudere wrangler bundelen die
          # public/_headers voor Workers-assets niet toepast (geen CSP/immutable
          # op de statische site). Deze versie past _headers wél toe.
          wranglerVersion: '4.107.0'
