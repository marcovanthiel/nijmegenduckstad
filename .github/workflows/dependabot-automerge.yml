name: Dependabot auto-merge
# Veiligheidsbeleid: alleen PATCH (alle deps) + MINOR van dev-dependencies worden
# automatisch gemerged, na een groene check en na de Dependabot-cooldown (5 dagen).
# Productie-minor en ALLE majors blijven als PR staan voor handmatige review.
# Op private repos (geen auto-merge-queue op free-plan) blijft de PR open voor een
# handmatige merge na groene CI.
on: pull_request
permissions:
  contents: write
  pull-requests: write
jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
      - name: Auto-merge (patch + dev-minor)
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || (steps.meta.outputs.update-type == 'version-update:semver-minor' && steps.meta.outputs.dependency-type == 'direct:development') }}
        run: gh pr merge --auto --squash "$PR_URL" || true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
