name: Dependabot auto-merge
# Mergt Dependabot-PR's automatisch: minor + patch + CI-actions + docker worden
# vanzelf gesquashed. MAJOR-bumps NIET — die blijven als PR staan voor review.
# Public repos: --auto wacht op groene checks. Private repos (geen auto-merge op
# free-plan): fallback naar directe squash-merge.
on: pull_request
permissions:
  contents: write
  pull-requests: write
jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
      - name: Auto-merge (geen majors)
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
